# Prometheus configuration for GPT Bitcoin Auto-Trading System
#
# This configuration file defines scrape targets for collecting metrics
# from the application and other services.

global:
  scrape_interval: 15s      # Default scrape interval
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    monitor: 'gpt-bitcoin-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
      timeout: 10s
      api_version: v2

# Rule files
rule_files:
  - "alerting/rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          environment: 'development'

  # GPT Bitcoin Application metrics
  - job_name: 'gpt-bitcoin-app'
    static_configs:
      - targets: ['app:9090']
        labels:
          application: 'gpt-bitcoin'
          component: 'auto-trading'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis metrics (if Redis exporter is deployed)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # PostgreSQL metrics (if PostgreSQL exporter is deployed)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

# Remote write configuration (optional - for long-term storage)
# remote_write:
#   - url: "http://remote-storage:9090/api/v1/write"

# Remote read configuration (optional)
# remote_read:
#   - url: "http://remote-storage:9090/api/v1/read"
