# Grafana Dashboard Provisioning Configuration
# Auto-loads dashboards from specified directory on startup

apiVersion: 1

providers:
  - name: 'GPT Bitcoin Dashboards'
    orgId: 1
    folder: 'GPT Bitcoin'
    folderUid: 'gpt-bitcoin'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
